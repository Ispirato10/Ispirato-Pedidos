<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Ispirato - Revenda de Produtos Naturais</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d5016" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ispirato - Revenda de Produtos Naturais" />
    <meta property="og:description" content="Portal oficial de pedidos para revendedores de produtos naturais Ispirato." />
    <meta property="og:image" content="https://ispirato-pedidos.vercel.app/share.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Ispirato - Revenda de Produtos Naturais" />
    <meta property="twitter:description" content="Portal oficial de pedidos para revendedores de produtos naturais Ispirato." />
    <meta property="twitter:image" content="https://ispirato-pedidos.vercel.app/share.jpg" />

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased selection:bg-emerald-200 selection:text-emerald-900">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('Service Worker registrado com sucesso:', reg.scope);
              
              // O próprio navegador gerencia as atualizações de forma eficiente.
              // Não há necessidade de chamadas manuais repetitivas como setInterval ou visibilidade.
            })
            .catch(err => console.error('Falha ao registrar o Service Worker:', err));

          // Recarrega a página assim que o novo service worker assumir o controle (controllerchange)
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
